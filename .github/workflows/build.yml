name: Build Packages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Calculate package version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
      is_release: ${{ steps.version.outputs.is_release }}

    steps:
      - name: Calculate version
        id: version
        env:
          BUILD_REF_NAME: ${{ github.ref_name }}
          BUILD_REF_TYPE: ${{ github.ref_type }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          echo "ref_type=${BUILD_REF_TYPE}"
          echo "ref_name=${BUILD_REF_NAME}"
          short_sha="${BUILD_SHA:0:7}"

          if [[ "${BUILD_REF_TYPE}" == "tag" ]]; then
            package_version="${BUILD_REF_NAME}"
            is_release="true"
          elif [[ "${BUILD_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            package_version="${BUILD_REF_NAME}-snapshot-${short_sha}"
            is_release="false"
          else
            package_version="dev-snapshot-${short_sha}"
            is_release="false"
          fi

          echo "package_version=${package_version}"
          echo "is_release=${is_release}"
          echo "package_version=${package_version}" >> "${GITHUB_OUTPUT}"
          echo "is_release=${is_release}" >> "${GITHUB_OUTPUT}"

  windows-installer:
    name: Windows installer
    needs: version
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      MUSICALC_VERSION: ${{ needs.version.outputs.package_version }}
      MUSICALC_SNAPSHOT_VERSION: ${{ needs.version.outputs.package_version }}
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Audit runner image
        run: |
          "ImageOS=$env:ImageOS"
          "ImageVersion=$env:ImageVersion"
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, OsHardwareAbstractionLayer

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true
          cache: true

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: master

      - name: Install Windows build tools
        run: |
          choco install llvm innosetup --yes --no-progress
          $env:GITHUB_PATH | ForEach-Object {
            Add-Content $_ "C:\Program Files\LLVM\bin"
            Add-Content $_ "C:\msys64\mingw64\bin"
            Add-Content $_ "C:\Program Files (x86)\Inno Setup 6"
          }

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          distribution: goreleaser
          version: latest

      - name: Audit toolchain
        run: |
          go version
          goreleaser --version
          clang --version
          x86_64-w64-mingw32-gcc --version
          zig version
          iscc /?
          if ($LASTEXITCODE -ne 0) { $global:LASTEXITCODE = 0 }

      - name: Test
        run: |
          New-Item -ItemType Directory -Force build\.cache\gobuildtmp, build\.cache\gocache | Out-Null
          $env:TEMP=(Resolve-Path build\.cache\gobuildtmp).Path
          $env:TMP=$env:TEMP
          $env:GOTMPDIR=$env:TEMP
          $env:GOCACHE=(Resolve-Path build\.cache\gocache).Path
          $env:CGO_ENABLED='1'
          $env:CC='clang --target=x86_64-w64-windows-gnu'
          $env:CXX='clang++ --target=x86_64-w64-windows-gnu'
          $env:GOFLAGS='-ldflags=-extld=x86_64-w64-mingw32-gcc'
          go test ./...

      - name: Check GoReleaser config
        run: goreleaser check --config build\release\goreleaser-win-all.yaml

      - name: Build Windows snapshot binaries
        if: needs.version.outputs.is_release != 'true'
        run: |
          New-Item -ItemType Directory -Force build\.cache\gobuildtmp, build\.cache\gocache | Out-Null
          $env:TEMP=(Resolve-Path build\.cache\gobuildtmp).Path
          $env:TMP=$env:TEMP
          $env:GOTMPDIR=$env:TEMP
          $env:GOCACHE=(Resolve-Path build\.cache\gocache).Path
          goreleaser build --snapshot --clean --config build\release\goreleaser-win-all.yaml

      - name: Build Windows release binaries
        if: needs.version.outputs.is_release == 'true'
        run: |
          New-Item -ItemType Directory -Force build\.cache\gobuildtmp, build\.cache\gocache | Out-Null
          $env:TEMP=(Resolve-Path build\.cache\gobuildtmp).Path
          $env:TMP=$env:TEMP
          $env:GOTMPDIR=$env:TEMP
          $env:GOCACHE=(Resolve-Path build\.cache\gocache).Path
          goreleaser build --clean --config build\release\goreleaser-win-all.yaml

      - name: Build Windows snapshot installer
        if: needs.version.outputs.is_release != 'true'
        run: .\build\scripts\build-installer.ps1 -Version $env:MUSICALC_VERSION

      - name: Build Windows release installer
        if: needs.version.outputs.is_release == 'true'
        run: .\build\scripts\build-installer.ps1 -Release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: musicalc-windows
          if-no-files-found: error
          retention-days: 14
          path: |
            build/dist/musicalc_x64.exe
            build/dist/musicalc_arm64.exe
            build/dist/installer/*.exe
            build/dist/artifacts.json
            build/dist/metadata.json

  macos-universal-dmg:
    name: macOS universal DMG
    needs: version
    runs-on: macos-26
    timeout-minutes: 45
    env:
      MUSICALC_VERSION: ${{ needs.version.outputs.package_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Audit runner image
        run: |
          sw_vers
          uname -a
          uname -m
          xcodebuild -version

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true
          cache: true

      - name: Audit toolchain
        run: |
          go version
          clang --version
          xcrun --find lipo
          command -v hdiutil

      - name: Test
        run: go test ./...

      - name: Build macOS universal app and DMG
        run: bash build/scripts/build-macos.sh

      - name: Verify macOS artifacts
        run: |
          test -d build/dist/macos/MusiCalc.app
          test -f "build/dist/macos/MusiCalc_${MUSICALC_VERSION}_universal.app.zip"
          test -f "build/dist/macos/musicalc_${MUSICALC_VERSION}_universal.dmg"
          plutil -lint build/dist/macos/MusiCalc.app/Contents/Info.plist
          lipo -info build/dist/macos/MusiCalc.app/Contents/MacOS/MusiCalc | tee build/dist/macos/lipo-info.txt
          grep -q "x86_64" build/dist/macos/lipo-info.txt
          grep -q "arm64" build/dist/macos/lipo-info.txt
          hdiutil verify "build/dist/macos/musicalc_${MUSICALC_VERSION}_universal.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: musicalc-macos
          if-no-files-found: error
          retention-days: 14
          path: |
            build/dist/macos/*.dmg
            build/dist/macos/*.zip
            build/dist/macos/lipo-info.txt

  linux-amd64-packages:
    name: Linux AMD64 packages
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      MUSICALC_VERSION: ${{ needs.version.outputs.package_version }}
      MUSICALC_SNAPSHOT_VERSION: ${{ needs.version.outputs.package_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Audit runner image
        run: |
          echo "ImageOS=${ImageOS}"
          echo "ImageVersion=${ImageVersion}"
          lsb_release -a
          uname -a

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true
          cache: true

      - name: Install Linux AMD64 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            gcc \
            g++ \
            libasound2-dev \
            libgl1-mesa-dev \
            pkg-config \
            rpm \
            xorg-dev

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          distribution: goreleaser
          version: latest

      - name: Audit toolchain
        run: |
          go version
          goreleaser --version
          gcc --version
          g++ --version
          pkg-config --version
          rpm --version

      - name: Test
        run: go test ./...

      - name: Check GoReleaser config
        run: goreleaser check --config build/release/goreleaser-linux-amd64.yaml

      - name: Build Linux AMD64 snapshot packages
        if: needs.version.outputs.is_release != 'true'
        run: goreleaser release --snapshot --clean --config build/release/goreleaser-linux-amd64.yaml --skip=publish

      - name: Build Linux AMD64 release packages
        if: needs.version.outputs.is_release == 'true'
        run: goreleaser release --clean --config build/release/goreleaser-linux-amd64.yaml --skip=publish

      - name: Upload Linux AMD64 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: musicalc-linux-amd64
          if-no-files-found: error
          retention-days: 14
          path: |
            build/dist/*.tar.gz
            build/dist/*.deb
            build/dist/*.rpm
            build/dist/artifacts.json
            build/dist/metadata.json

  linux-arm64-packages:
    name: Linux ARM64 packages
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MUSICALC_VERSION: ${{ needs.version.outputs.package_version }}
      MUSICALC_SNAPSHOT_VERSION: ${{ needs.version.outputs.package_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Audit runner image
        run: |
          echo "ImageOS=${ImageOS}"
          echo "ImageVersion=${ImageVersion}"
          lsb_release -a
          uname -a

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          check-latest: true
          cache: true

      - name: Install Linux ARM64 cross dependencies
        run: |
          . /etc/os-release
          sudo dpkg --add-architecture arm64
          sudo mkdir -p /etc/apt/sources.list.d/disabled
          sudo find /etc/apt/sources.list.d -maxdepth 1 -type f \( -name '*.sources' -o -name '*.list' \) -exec mv {} /etc/apt/sources.list.d/disabled/ \;
          sudo tee /etc/apt/sources.list.d/ubuntu-amd64.sources >/dev/null <<EOF
          Types: deb
          URIs: http://archive.ubuntu.com/ubuntu
          Suites: ${VERSION_CODENAME} ${VERSION_CODENAME}-updates ${VERSION_CODENAME}-backports
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg

          Types: deb
          URIs: http://security.ubuntu.com/ubuntu
          Suites: ${VERSION_CODENAME}-security
          Components: main restricted universe multiverse
          Architectures: amd64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources >/dev/null <<EOF
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: ${VERSION_CODENAME} ${VERSION_CODENAME}-updates ${VERSION_CODENAME}-backports ${VERSION_CODENAME}-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libasound2-dev:arm64 \
            libgl1-mesa-dev:arm64 \
            libxcursor-dev:arm64 \
            libxi-dev:arm64 \
            libxinerama-dev:arm64 \
            libxrandr-dev:arm64 \
            libx11-dev:arm64 \
            libxxf86vm-dev:arm64 \
            pkg-config \
            rpm

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          distribution: goreleaser
          version: latest

      - name: Audit toolchain
        run: |
          go version
          goreleaser --version
          aarch64-linux-gnu-gcc --version
          aarch64-linux-gnu-g++ --version
          pkg-config --version
          rpm --version

      - name: Check GoReleaser config
        run: goreleaser check --config build/release/goreleaser-linux-arm64.yaml

      - name: Build Linux ARM64 snapshot packages
        if: needs.version.outputs.is_release != 'true'
        run: goreleaser release --snapshot --clean --config build/release/goreleaser-linux-arm64.yaml --skip=publish

      - name: Build Linux ARM64 release packages
        if: needs.version.outputs.is_release == 'true'
        run: goreleaser release --clean --config build/release/goreleaser-linux-arm64.yaml --skip=publish

      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v7
        with:
          name: musicalc-linux-arm64
          if-no-files-found: error
          retention-days: 14
          path: |
            build/dist/*.tar.gz
            build/dist/*.deb
            build/dist/*.rpm
            build/dist/artifacts.json
            build/dist/metadata.json
